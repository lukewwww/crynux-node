name: Create and publish the Standalone Docker image

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'build manually trigger'
        required: true
        default: 'triggered by developer'
      blockchain:
        description: 'Blockchain'
        required: true
        default: 'base'
      tag:
        description: 'Release version to build from v-prefixed git tag (if not specified, use selected ref and git hash)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve checkout ref
        id: ref
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_TAG}" ]]; then
            echo "checkout_ref=v${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 35840
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.ref.outputs.checkout_ref }}
          submodules: recursive

      - name: Set the config files
        run: |
            chmod +x build/set-config-files.sh
            ./build/set-config-files.sh ${{ inputs.blockchain }}

      - name: Configure Docker storage
        shell: bash
        run: |
          set -eux
          sudo systemctl stop docker
          sudo rm -rf /var/lib/docker
          sudo mkdir -p "${GITHUB_WORKSPACE}/.docker-data"
          sudo tee /etc/docker/daemon.json >/dev/null <<EOF
          {
            "data-root": "${GITHUB_WORKSPACE}/.docker-data"
          }
          EOF
          sudo systemctl start docker
          docker info

      - name: Show disk usage before Docker build
        shell: bash
        run: |
          set -eux
          df -h
          docker system df || true
          sudo du -hxd1 / /mnt "${GITHUB_WORKSPACE}" "${GITHUB_WORKSPACE}/.docker-data" 2>/dev/null | sort -h || true

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker tags
        id: vars
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          BLOCKCHAIN: ${{ inputs.blockchain }}
        run: |
          set -euo pipefail
          SHA_SHORT="$(git rev-parse --short HEAD)"

          if [[ -n "${INPUT_TAG}" ]]; then
            IMAGE_TAG="${INPUT_TAG#v}"
          else
            IMAGE_TAG="${SHA_SHORT}"
          fi

          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}-${BLOCKCHAIN}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          file: build/docker/Dockerfile
          tags: ${{ steps.vars.outputs.tags }}

      - name: Show disk usage after Docker build
        if: always()
        shell: bash
        run: |
          set -eux
          df -h
          docker system df || true
          sudo du -hxd1 / /mnt "${GITHUB_WORKSPACE}" "${GITHUB_WORKSPACE}/.docker-data" 2>/dev/null | sort -h || true
