name: Release the Docker image for a specific blockchain

on:
  workflow_call:
    inputs:
      blockchain:
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-the-docker-image:
    name: Build the release Docker image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
        - name: Maximize build space
          uses: easimon/maximize-build-space@master
          with:
            root-reserve-mb: 35840
            remove-dotnet: 'true'
            remove-android: 'true'
            remove-haskell: 'true'
            remove-codeql: 'true'
            remove-docker-images: 'true'

        - name: Checkout repository
          uses: actions/checkout@v3
          with:
            submodules: 'true'

        - name: Set the config files
          shell: bash
          run: |
            set -e
            chmod +x build/set-config-files.sh
            ./build/set-config-files.sh ${{ inputs.blockchain }}

        - name: Configure Docker storage
          shell: bash
          run: |
            set -eux
            sudo systemctl stop docker
            sudo rm -rf /var/lib/docker
            sudo mkdir -p "${GITHUB_WORKSPACE}/.docker-data"
            sudo tee /etc/docker/daemon.json >/dev/null <<EOF
            {
              "data-root": "${GITHUB_WORKSPACE}/.docker-data"
            }
            EOF
            sudo systemctl start docker
            docker info

        - name: Show disk usage before Docker build
          shell: bash
          run: |
            set -eux
            df -h
            docker system df || true
            sudo du -hxd1 / /mnt "${GITHUB_WORKSPACE}" "${GITHUB_WORKSPACE}/.docker-data" 2>/dev/null | sort -h || true

        - name: Log in to the Container registry
          uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Extract metadata (tags, labels) for Docker
          id: meta
          uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
          with:
            images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            flavor: |
              suffix=-${{ inputs.blockchain }},latest=false
            tags: |
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}

        - name: Build and push Docker image
          uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
          with:
            context: .
            push: true
            file: build/docker/Dockerfile
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}

        - name: Show disk usage after Docker build
          if: always()
          shell: bash
          run: |
            set -eux
            df -h
            docker system df || true
            sudo du -hxd1 / /mnt "${GITHUB_WORKSPACE}" "${GITHUB_WORKSPACE}/.docker-data" 2>/dev/null | sort -h || true
